name: Build APK

on:
  workflow_dispatch:
    inputs:
      appName:
        required: true
      appUrl:
        required: true
      iconUrl:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Inject App URL
        run: |
          FILE=$(find app/src/main/java -name MainActivity.kt | head -n 1)
          sed -i "s|%%APP_URL%%|${{ inputs.appUrl }}|g" "$FILE"

      - name: Download Icon
        if: inputs.iconUrl != ''
        run: |
          mkdir -p /tmp/icon
          curl -L "${{ inputs.iconUrl }}" -o /tmp/icon/icon.png

      - name: Resize & Replace Icon
        if: inputs.iconUrl != ''
        run: |
          sudo apt install -y imagemagick
          declare -A icons=(
            ["mipmap-mdpi"]=48
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )

          for dir in "${!icons[@]}"; do
            size=${icons[$dir]}
            convert /tmp/icon/icon.png -resize ${size}x${size} \
              app/src/main/res/$dir/ic_launcher.png
          done

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/debug/*.apk
