name: Build & Upload APK

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'Nama aplikasi'
        required: true
      appUrl:
        description: 'URL aplikasi'
        required: true
      iconUrl:
        description: 'URL icon (opsional, png/jpg/webp)'
        required: false
      backgroundUrl:
        description: 'URL background (wajib PNG)'
        required: false
      jobId:
        description: 'Job ID unik dari API'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Locate Android Project
        run: |
          ROOT=$(find . -name gradlew | head -n 1)
          if [ -z "$ROOT" ]; then
            echo "Gradlew not found"
            exit 1
          fi
          DIR=$(dirname "$ROOT")
          echo "ANDROID_DIR=$DIR" >> $GITHUB_ENV

      - name: Inject App Name
        run: |
          STRINGS=$(find "$ANDROID_DIR" -path "*res/values/strings.xml" | head -n 1)
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${{ inputs.appName }}</string>|" "$STRINGS"

      - name: Inject App URL
        run: |
          FILE=$(find "$ANDROID_DIR" -name MainActivity.kt | head -n 1)
          sed -i "s|%%APP_URL%%|${{ inputs.appUrl }}|g" "$FILE"

      - name: Download & Process DPI Icons
        if: ${{ inputs.iconUrl != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick webp curl

          mkdir -p /tmp/icon
          curl -L "${{ inputs.iconUrl }}" -o /tmp/icon/icon.png

          declare -A sizes=(
            ["mipmap-mdpi"]=48
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )

          for dir in "${!sizes[@]}"; do
            SIZE=${sizes[$dir]}
            TARGET="$ANDROID_DIR/app/src/main/res/$dir"
            mkdir -p "$TARGET"

            convert /tmp/icon/icon.png -resize "${SIZE}x${SIZE}" "$TARGET/ic_launcher.webp"

            convert /tmp/icon/icon.png -resize "${SIZE}x${SIZE}" \
              -alpha set -background none \
              \( -size ${SIZE}x${SIZE} xc:none -fill white -draw "circle $((SIZE/2)),$((SIZE/2)) $((SIZE/2)),$((SIZE-1))" \) \
              -compose DstIn -composite \
              "$TARGET/ic_launcher_round.webp"
          done

      - name: Replace Default Mipmap Icons
        if: ${{ inputs.iconUrl != '' || inputs.backgroundUrl != '' }}
        run: |
          MIPMAP="$ANDROID_DIR/app/src/main/res/mipmap"
          mkdir -p "$MIPMAP"

          if [ "${{ inputs.iconUrl }}" != "" ]; then
            curl -L "${{ inputs.iconUrl }}" -o /tmp/fg.png
            convert /tmp/fg.png -resize 192x192! "$MIPMAP/ic_launcher_foreground.png"
          fi

          if [ "${{ inputs.backgroundUrl }}" != "" ]; then
            curl -L "${{ inputs.backgroundUrl }}" -o /tmp/bg.png
            convert /tmp/bg.png -resize 192x192! "$MIPMAP/ic_launcher_background.png"
          else
            convert -size 192x192 xc:none "$MIPMAP/ic_launcher_background.png"
          fi

      - name: Check GH_PAT
        run: |
          if [ -z "${{ secrets.GH_PAT }}" ]; then
            echo "GH_PAT kosong"
            exit 1
          fi

      - name: Build APK
        run: |
          cd "$ANDROID_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Zip APK Result
        run: |
          mkdir -p /tmp/build_result
          cp "$ANDROID_DIR/app/build/outputs/apk/debug/"*-debug*.apk \
             /tmp/build_result/app_${{ inputs.jobId }}.apk

          cd /tmp/build_result
          zip app_${{ inputs.jobId }}.zip app_${{ inputs.jobId }}.apk

      - name: Push APK to Repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://x-access-token:${GH_PAT}@github.com/xpatzX1/xpatzbuilder.git repo_push

          mkdir -p repo_push/files
          cp /tmp/build_result/app_${{ inputs.jobId }}.zip repo_push/files/

          cd repo_push

          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add files/app_${{ inputs.jobId }}.zip
          git commit -m "Add APK result ${{ inputs.jobId }}" || echo "No changes to commit"

          git push origin main

      - name: List APKs
        run: |
          ls -la "$ANDROID_DIR/app/build/outputs/apk/debug/"
