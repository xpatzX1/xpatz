name: Build APK

on:
  workflow_dispatch:
    inputs:
      appName:
        required: true
        type: string
      appUrl:
        required: true
        type: string
      iconUrl:
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Inject App URL
        run: |
          FILE=$(find . -name MainActivity.kt | head -n 1)
          echo "Found MainActivity at: $FILE"

          if [ -z "$FILE" ]; then
            echo "MainActivity.kt NOT FOUND"
            exit 1
          fi

          sed -i "s|%APP_URL%|${{ inputs.appUrl }}|g" "$FILE"

      - name: Download Icon
        if: inputs.iconUrl != ''
        run: |
          mkdir -p /tmp/icon
          curl -L "${{ inputs.iconUrl }}" -o /tmp/icon/icon.png

      - name: Resize & Replace Icon
        if: inputs.iconUrl != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

          declare -A icons=(
            ["mipmap-mdpi"]=48
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )

          RES_DIR=$(find . -path "*/src/main/res" | head -n 1)

          if [ -z "$RES_DIR" ]; then
            echo "res directory NOT FOUND"
            exit 1
          fi

          for dir in "${!icons[@]}"; do
            size=${icons[$dir]}
            mkdir -p "$RES_DIR/$dir"
            convert /tmp/icon/icon.png -resize ${size}x${size} \
              "$RES_DIR/$dir/ic_launcher.png"
          done

      - name: Grant Gradle Permission
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: |
            **/build/outputs/apk/debug/*.apk
