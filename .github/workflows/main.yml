name: Build APK

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'Nama aplikasi'
        required: true
      appUrl:
        description: 'URL aplikasi'
        required: true
      iconUrl:
        description: 'URL icon (opsional, png/jpg/webp)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Locate Android Project
        id: locate
        run: |
          ROOT=$(find . -name gradlew | head -n 1)
          if [ -z "$ROOT" ]; then
            echo "Gradlew not found"
            exit 1
          fi
          DIR=$(dirname "$ROOT")
          echo "ANDROID_DIR=$DIR" >> $GITHUB_ENV

      - name: Inject App Name
        run: |
          STRINGS=$(find "$ANDROID_DIR" -path "*res/values/strings.xml" | head -n 1)
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${{ inputs.appName }}</string>|" "$STRINGS"

      - name: Inject App URL
        run: |
          FILE=$(find "$ANDROID_DIR" -name MainActivity.kt | head -n 1)
          sed -i "s|%%APP_URL%%|${{ inputs.appUrl }}|g" "$FILE"

      - name: Download & Process App Icon
        if: ${{ inputs.iconUrl != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick webp

          mkdir -p /tmp/icon
          ICON_URL="${{ inputs.iconUrl }}"
          EXT="${ICON_URL##*.}"
          ICON_TMP="/tmp/icon/icon.$EXT"
          curl -L "$ICON_URL" -o "$ICON_TMP"

          declare -A sizes=( 
            ["mipmap-mdpi"]=48 
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )

          for dir in "${!sizes[@]}"; do
            SIZE=${sizes[$dir]}
            TARGET_DIR="$ANDROID_DIR/app/src/main/res/$dir"
            mkdir -p "$TARGET_DIR"

            # Kotak
            convert "$ICON_TMP" -resize "${SIZE}x${SIZE}" "$TARGET_DIR/ic_launcher.webp"

            # Lingkaran
            convert "$ICON_TMP" -resize "${SIZE}x${SIZE}" \
              -alpha set -background none \
              \( -size ${SIZE}x${SIZE} xc:none -fill white -draw "circle $((SIZE/2)),$((SIZE/2)) $((SIZE/2)),$((SIZE-1))" \) \
              -compose DstIn -composite \
              "$TARGET_DIR/ic_launcher_round.webp"
          done

          # Fallback mipmap
          FALLBACK_DIR="$ANDROID_DIR/app/src/main/res/mipmap"
          mkdir -p "$FALLBACK_DIR"
          cp "$ANDROID_DIR/app/src/main/res/mipmap-xxxhdpi/ic_launcher.webp" "$FALLBACK_DIR/ic_launcher.webp"
          cp "$ANDROID_DIR/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.webp" "$FALLBACK_DIR/ic_launcher_round.webp"

          # Adaptive icon XML (YAML-safe)
          ADAPTIVE_XML_DIR="$ANDROID_DIR/app/src/main/res/mipmap-anydpi-v26"
          mkdir -p "$ADAPTIVE_XML_DIR"

echo '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">' > "$ADAPTIVE_XML_DIR/ic_launcher.xml"
echo '    <background android:drawable="@mipmap/ic_launcher"/>' >> "$ADAPTIVE_XML_DIR/ic_launcher.xml"
echo '    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>' >> "$ADAPTIVE_XML_DIR/ic_launcher.xml"
echo '    <monochrome android:drawable="@mipmap/ic_launcher_foreground"/>' >> "$ADAPTIVE_XML_DIR/ic_launcher.xml"
echo '</adaptive-icon>' >> "$ADAPTIVE_XML_DIR/ic_launcher.xml"

echo '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">' > "$ADAPTIVE_XML_DIR/ic_launcher_round.xml"
echo '    <background android:drawable="@mipmap/ic_launcher"/>' >> "$ADAPTIVE_XML_DIR/ic_launcher_round.xml"
echo '    <foreground android:drawable="@mipmap/ic_launcher_round"/>' >> "$ADAPTIVE_XML_DIR/ic_launcher_round.xml"
echo '    <monochrome android:drawable="@mipmap/ic_launcher_round"/>' >> "$ADAPTIVE_XML_DIR/ic_launcher_round.xml"
echo '</adaptive-icon>' >> "$ADAPTIVE_XML_DIR/ic_launcher_round.xml"

      - name: Build APK
        run: |
          cd "$ANDROID_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "AndroidWebviewTemplate/app/build/outputs/apk/debug/*-debug*.apk"

      - name: List APKs
        run: ls -la "$ANDROID_DIR/app/build/outputs/apk/debug/"
