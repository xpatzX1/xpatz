name: Build APK

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'Nama aplikasi'
        required: true
      appUrl:
        description: 'URL aplikasi'
        required: true
      iconUrl:
        description: 'URL icon (opsional, png/jpg/webp)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Locate Android Project
        id: locate
        run: |
          ROOT=$(find . -name gradlew | head -n 1)
          if [ -z "$ROOT" ]; then
            echo "Gradlew not found"
            exit 1
          fi
          DIR=$(dirname "$ROOT")
          echo "ANDROID_DIR=$DIR" >> $GITHUB_ENV

      - name: Inject App Name
        run: |
          STRINGS=$(find "$ANDROID_DIR" -path "*res/values/strings.xml" | head -n 1)
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${{ inputs.appName }}</string>|" "$STRINGS"

      - name: Inject App URL
        run: |
          FILE=$(find "$ANDROID_DIR" -name MainActivity.kt | head -n 1)
          sed -i "s|%%APP_URL%%|${{ inputs.appUrl }}|g" "$FILE"

      - name: Download & Replace Adaptive Icon Drawables
        if: ${{ inputs.iconUrl != '' }}
        run: |
          mkdir -p /tmp/icon
          ICON_URL="${{ inputs.iconUrl }}"
          EXT="${ICON_URL##*.}"
          ICON_TMP="/tmp/icon/icon.$EXT"
          curl -L "$ICON_URL" -o "$ICON_TMP"

          sudo apt-get update
          sudo apt-get install -y imagemagick webp

          # Hanya update drawable foreground/background (PNG), jangan overwrite XML
          DRAWABLE_DIR="$ANDROID_DIR/app/src/main/res/drawable"
          mkdir -p "$DRAWABLE_DIR"
          convert "$ICON_TMP" -resize 192x192 "$DRAWABLE_DIR/ic_launcher_foreground.png"
          convert "$ICON_TMP" -resize 192x192 "$DRAWABLE_DIR/ic_launcher_background.png"

          # Update mipmap non-v26 (launcher lama) pakai webp
          for dir in "$ANDROID_DIR"/app/src/main/res/mipmap-*/; do
            FILE=$(basename "$dir")
            if [[ "$FILE" == *"v26"* ]]; then
              continue
            fi
            cp "$DRAWABLE_DIR/ic_launcher_foreground.png" "$dir/ic_launcher.webp"
            cp "$DRAWABLE_DIR/ic_launcher_background.png" "$dir/ic_launcher_round.webp"
          done

      - name: Build APK
        run: |
          cd "$ANDROID_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "$ANDROID_DIR/app/build/outputs/apk/debug/*-debug*.apk"

      - name: List APKs
        run: ls -la "$ANDROID_DIR/app/build/outputs/apk/debug/"
