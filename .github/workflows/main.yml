name: Build APK

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'Nama aplikasi'
        required: true
      appUrl:
        description: 'URL aplikasi'
        required: true
      iconUrl:
        description: 'URL icon (opsional, png/jpg/webp)'
        required: false
      backgroundUrl:
        description: 'URL background (opsional, PNG)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Locate Android Project
        id: locate
        run: |
          ROOT=$(find . -name gradlew | head -n 1)
          if [ -z "$ROOT" ]; then
            echo "Gradlew not found"
            exit 1
          fi
          DIR=$(dirname "$ROOT")
          echo "ANDROID_DIR=$DIR" >> $GITHUB_ENV

      - name: Inject App Name
        run: |
          STRINGS=$(find "$ANDROID_DIR" -path "*res/values/strings.xml" | head -n 1)
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">${{ inputs.appName }}</string>|" "$STRINGS"

      - name: Inject App URL
        run: |
          FILE=$(find "$ANDROID_DIR" -name MainActivity.kt | head -n 1)
          sed -i "s|%%APP_URL%%|${{ inputs.appUrl }}|g" "$FILE"

      - name: Download & Process DPI Foreground Icons
        if: ${{ inputs.iconUrl != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick curl

          declare -A sizes=( 
            ["mipmap-mdpi"]=48 
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )

          for dir in "${!sizes[@]}"; do
            SIZE=${sizes[$dir]}
            TARGET_DIR="$ANDROID_DIR/app/src/main/res/$dir"
            mkdir -p "$TARGET_DIR"
            curl -L "${{ inputs.iconUrl }}" -o /tmp/ic_foreground.png
            convert /tmp/ic_foreground.png -resize ${SIZE}x${SIZE}\! "$TARGET_DIR/ic_launcher_foreground.png"
          done

      - name: Replace Background Icon (192x192 transparan or from URL)
        if: ${{ inputs.backgroundUrl != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick curl

          MIPMAP_DIR="$ANDROID_DIR/app/src/main/res/mipmap"
          mkdir -p "$MIPMAP_DIR"

          # Jika backgroundUrl diberikan
          if [ "${{ inputs.backgroundUrl }}" != "" ]; then
            curl -L "${{ inputs.backgroundUrl }}" -o /tmp/ic_background.png
            convert /tmp/ic_background.png -resize 192x192\! "$MIPMAP_DIR/ic_launcher_background.png"
          else
            # Background transparan
            convert -size 192x192 xc:none "$MIPMAP_DIR/ic_launcher_background.png"
          fi

          echo "Foreground sesuai dpi, background 192x192 siap"

      - name: Build APK
        run: |
          cd "$ANDROID_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "$ANDROID_DIR/app/build/outputs/apk/debug/*-debug*.apk"

      - name: List APKs
        run: ls -la "$ANDROID_DIR/app/build/outputs/apk/debug/"
