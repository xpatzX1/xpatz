name: Universal APK Builder

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      zipUrl:
        description: "ZIP project URL"
        required: true
      jobId:
        description: "Job ID"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base deps
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git zip unzip openjdk-17-jdk libarchive-tools

      - name: Download ZIP
        run: |
          set -e
          mkdir -p build/project
          curl -L "${{ inputs.zipUrl }}" -o build/project.zip

          echo "Extracting ZIP..."
          bsdtar -xf build/project.zip -C build/project

      - name: Clean extracted files
        run: |
          set -e
          find build/project -name "__MACOSX" -type d -exec rm -rf {} + 2>/dev/null || true
          find build/project -name ".DS_Store" -type f -delete 2>/dev/null || true

      - name: Normalize project structure
        run: |
          set -e
          echo "Normalizing structure..."

          while true; do
            COUNT=$(find build/project -mindepth 1 -maxdepth 1 ! -name "__MACOSX" | wc -l)

            if [ "$COUNT" != "1" ]; then
              break
            fi

            FIRST=$(find build/project -mindepth 1 -maxdepth 1 ! -name "__MACOSX" | head -n1)

            if [ -d "$FIRST" ]; then
              TMP_DIR=$(mktemp -d)
              shopt -s dotglob nullglob
              mv "$FIRST"/* "$TMP_DIR"/ 2>/dev/null || true
              rm -rf "$FIRST"
              mv "$TMP_DIR"/* build/project/ 2>/dev/null || true
              rm -rf "$TMP_DIR"
            else
              break
            fi
          done

      - name: Debug project structure
        run: |
          echo "=== TOP LEVEL ==="
          find build/project -maxdepth 2 | sort
          echo "=== PUBSPEC FILES ==="
          find build/project -type f -name "pubspec.yaml" | sort || true
          echo "=== GRADLEW FILES ==="
          find build/project -type f -name "gradlew" | sort || true

      - name: Detect project type
        shell: bash
        run: |
          set -e

          BEST_TYPE=""
          BEST_DIR=""
          BEST_SCORE=-1

          echo "Scanning for best project root..."

          while IFS= read -r pubspec; do
            [ -z "$pubspec" ] && continue
            dir=$(dirname "$pubspec")
            score=0

            [ -d "$dir/android" ] && score=$((score + 10))
            [ -d "$dir/lib" ] && score=$((score + 5))
            [ -d "$dir/assets" ] && score=$((score + 2))
            [ -f "$dir/.metadata" ] && score=$((score + 2))
            [ -f "$dir/analysis_options.yaml" ] && score=$((score + 1))
            [ -f "$dir/android/gradlew" ] && score=$((score + 3))
            [ -f "$dir/android/app/build.gradle" ] && score=$((score + 3))
            [ -f "$dir/android/app/build.gradle.kts" ] && score=$((score + 3))

            depth=$(echo "$dir" | awk -F/ '{print NF}')
            score=$((score + 100 - depth))

            echo "[FLUTTER CANDIDATE] $dir | score=$score"

            if [ "$score" -gt "$BEST_SCORE" ]; then
              BEST_SCORE=$score
              BEST_TYPE="flutter"
              BEST_DIR="$dir"
            fi
          done < <(find build/project -type f -name "pubspec.yaml" | sort)

          while IFS= read -r gradlew; do
            [ -z "$gradlew" ] && continue
            dir=$(dirname "$gradlew")
            score=0

            [ -d "$dir/app" ] && score=$((score + 8))
            [ -f "$dir/settings.gradle" ] && score=$((score + 4))
            [ -f "$dir/settings.gradle.kts" ] && score=$((score + 4))
            [ -f "$dir/build.gradle" ] && score=$((score + 3))
            [ -f "$dir/build.gradle.kts" ] && score=$((score + 3))
            [ -d "$dir/gradle" ] && score=$((score + 2))

            depth=$(echo "$dir" | awk -F/ '{print NF}')
            score=$((score + 100 - depth))

            echo "[GRADLE CANDIDATE] $dir | score=$score"

            if [ "$score" -gt "$BEST_SCORE" ]; then
              BEST_SCORE=$score
              BEST_TYPE="gradle"
              BEST_DIR="$dir"
            fi
          done < <(find build/project -type f -name "gradlew" | sort)

          if [ -z "$BEST_TYPE" ] || [ -z "$BEST_DIR" ]; then
            echo "Unsupported project"
            exit 1
          fi

          echo "TYPE=$BEST_TYPE" >> "$GITHUB_ENV"
          echo "DIR=$BEST_DIR" >> "$GITHUB_ENV"

          echo "Detected project type: $BEST_TYPE"
          echo "Detected project dir: $BEST_DIR"
          echo "Detected score: $BEST_SCORE"

      - name: Setup Flutter
        if: env.TYPE == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0"
          cache: true

      - name: Flutter doctor
        if: env.TYPE == 'flutter'
        run: flutter doctor -v

      - name: Flutter pub get
        if: env.TYPE == 'flutter'
        run: |
          set -e
          cd "$DIR"
          flutter pub get

      - name: Build Flutter APK
        if: env.TYPE == 'flutter'
        run: |
          set -e
          cd "$DIR"
          flutter build apk --release

      - name: Build Gradle APK
        if: env.TYPE == 'gradle'
        run: |
          set -e
          cd "$DIR"
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Collect APK
        shell: bash
        run: |
          set -e
          mkdir -p result

          APK=""

          if [ "$TYPE" = "flutter" ]; then
            APK=$(find "$DIR/build/app/outputs/flutter-apk" -type f -name "*.apk" 2>/dev/null | sort | grep -E 'release|app-release' | head -n1 || true)
          fi

          if [ -z "$APK" ] && [ "$TYPE" = "gradle" ]; then
            APK=$(find "$DIR" -type f -path "*/outputs/apk/*/*.apk" 2>/dev/null | grep -E 'release' | head -n1 || true)
          fi

          if [ -z "$APK" ]; then
            APK=$(find build -type f -name "*.apk" 2>/dev/null | grep -E 'release|app-release' | head -n1 || true)
          fi

          if [ -z "$APK" ]; then
            echo "APK not found"
            find build -type f | sort | tail -n 200
            exit 1
          fi

          echo "APK found: $APK"

          cp "$APK" "result/app_${{ inputs.jobId }}.apk"

          cd result
          zip -q "app_${{ inputs.jobId }}.zip" "app_${{ inputs.jobId }}.apk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk_${{ inputs.jobId }}
          path: result/app_${{ inputs.jobId }}.zip

      - name: Push to Repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -e
          git clone https://github.com/Joodev65/Joomodss.id.git repo

          mkdir -p repo/X
          cp "result/app_${{ inputs.jobId }}.zip" repo/X/

          cd repo
          git config user.name "Actions Bot"
          git config user.email "actions@github.com"
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/Joodev65/Joomodss.id.git"

          git add .
          git commit -m "Add APK ${{ inputs.jobId }}" || true
          git push          cd repo

          git config user.name "Actions Bot"
          git config user.email "actions@github.com"

          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/Joodev65/Joomodss.id.git

          git add .
          git commit -m "Add APK ${{ inputs.jobId }}" || true
          git push
