name: Universal APK Builder

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      zipUrl:
        description: "ZIP project URL"
        required: true
      jobId:
        description: "Job ID"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            unzip \
            curl \
            git \
            openjdk-17-jdk \
            libarchive-tools \
            imagemagick \
            wget \
            zip


      - name: Setup Android SDK
        uses: android-actions/setup-android@v3


      - name: Accept Android licenses
        run: yes | sdkmanager --licenses


      - name: Install Android components
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"


      - name: Download project ZIP
        run: |
          mkdir -p build/project

          echo "Downloading project..."

          for i in 1 2 3; do
            curl -L "${{ inputs.zipUrl }}" -o build/project.zip && break
            echo "Retry download..."
            sleep 3
          done

          echo "Extracting ZIP..."

          bsdtar -xf build/project.zip -C build/project || unzip build/project.zip -d build/project


      - name: Normalize project structure
        run: |
          echo "Normalizing project structure..."

          COUNT=$(find build/project -mindepth 1 -maxdepth 1 | wc -l)

          if [ "$COUNT" = "1" ]; then
            FIRST=$(find build/project -mindepth 1 -maxdepth 1 | head -n1)

            if [ -d "$FIRST" ]; then
              mv "$FIRST"/* build/project/ 2>/dev/null || true
              mv "$FIRST"/.[!.]* build/project/ 2>/dev/null || true
              mv "$FIRST"/..?* build/project/ 2>/dev/null || true
            fi
          fi


      - name: Debug project files
        run: |
          echo "Project structure:"
          find build/project -maxdepth 4


      - name: Generate / repair launcher icons
        run: |
          BASE="build/project/android/app/src/main/res"

          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do

            case $d in
              mdpi) SIZE=48 ;;
              hdpi) SIZE=72 ;;
              xhdpi) SIZE=96 ;;
              xxhdpi) SIZE=144 ;;
              xxxhdpi) SIZE=192 ;;
            esac

            DIR="$BASE/mipmap-$d"
            ICON="$DIR/ic_launcher.png"

            mkdir -p "$DIR"

            if [ -f "$ICON" ]; then
              convert "$ICON" -resize ${SIZE}x${SIZE} "$ICON" 2>/dev/null || true
            else
              convert -size ${SIZE}x${SIZE} xc:"#3DDC84" \
                -gravity center \
                -pointsize 24 \
                -fill white \
                -annotate 0 "A" \
                "$ICON"
            fi

          done


      - name: Detect project type
        run: |
          PUBSPEC=$(find build/project -name pubspec.yaml | head -n1)

          if [ ! -z "$PUBSPEC" ]; then
            echo "TYPE=flutter" >> $GITHUB_ENV
            echo "DIR=$(dirname "$PUBSPEC")" >> $GITHUB_ENV
            exit 0
          fi

          GRADLE=$(find build/project -name gradlew | head -n1)

          if [ ! -z "$GRADLE" ]; then
            echo "TYPE=gradle" >> $GITHUB_ENV
            echo "DIR=$(dirname "$GRADLE")" >> $GITHUB_ENV
            exit 0
          fi

          echo "Unsupported project"
          exit 1


      - name: Setup Flutter
        if: env.TYPE == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0"
          cache: true


      - name: Flutter doctor
        if: env.TYPE == 'flutter'
        run: flutter doctor -v


      - name: Install Flutter dependencies
        if: env.TYPE == 'flutter'
        run: |
          cd "$DIR"

          for i in 1 2 3; do
            flutter pub get && break
            sleep 3
          done


      - name: Build Flutter APK
        if: env.TYPE == 'flutter'
        run: |
          cd "$DIR"

          flutter build apk --release \
          || flutter build apk --release --no-tree-shake-icons \
          || flutter build apk --debug


      - name: Build Gradle APK
        if: env.TYPE == 'gradle'
        run: |
          cd "$DIR"

          chmod +x gradlew

          ./gradlew assembleRelease \
          || ./gradlew build \
          || ./gradlew assembleDebug


      - name: Collect APK
        run: |
          mkdir -p result

          APK=$(find build -type f -name "*.apk" | head -n1)

          if [ -z "$APK" ]; then
            echo "APK not found"
            exit 1
          fi

          echo "APK found: $APK"

          cp "$APK" result/app_${{ inputs.jobId }}.apk

          cd result
          zip app_${{ inputs.jobId }}.zip app_${{ inputs.jobId }}.apk


      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk_${{ inputs.jobId }}
          path: result/app_${{ inputs.jobId }}.zip


      - name: Push APK to repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://github.com/Joodev65/Joomodss.id.git repo

          mkdir -p repo/X
          cp result/app_${{ inputs.jobId }}.zip repo/X/

          cd repo

          git config user.name "Actions Bot"
          git config user.email "actions@github.com"

          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/Joodev65/Joomodss.id.git

          git add .
          git commit -m "Add APK ${{ inputs.jobId }}" || true
          git push
