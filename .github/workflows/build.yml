name: Universal APK Builder

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      zipUrl:
        description: "ZIP project URL"
        required: true
      jobId:
        description: "Job ID"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install base deps
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl git openjdk-17-jdk libarchive-tools imagemagick

      - name: Download ZIP
        run: |
          mkdir -p build/project
          curl -L "${{ inputs.zipUrl }}" -o build/project.zip

          echo "Extracting ZIP..."
          bsdtar -xf build/project.zip -C build/project

      - name: Normalize project structure
        run: |
          echo "Normalizing structure..."

          COUNT=$(find build/project -mindepth 1 -maxdepth 1 | wc -l)

          if [ "$COUNT" = "1" ]; then
            FIRST=$(find build/project -mindepth 1 -maxdepth 1 | head -n1)
            if [ -d "$FIRST" ]; then
              mv "$FIRST"/* build/project/ 2>/dev/null || true
              mv "$FIRST"/.[!.]* build/project/ 2>/dev/null || true
              mv "$FIRST"/..?* build/project/ 2>/dev/null || true
            fi
          fi

      - name: Debug project structure
        run: |
          echo "Project files:"
          find build/project -maxdepth 3

      - name: Fix launcher icons
        run: |
          echo "Checking launcher icons..."

          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            ICON="build/project/android/app/src/main/res/mipmap-$d/ic_launcher.png"

            if [ -f "$ICON" ]; then
              echo "Checking $ICON"

              file "$ICON"

              convert "$ICON" PNG32:"$ICON.fixed.png" 2>/dev/null || true

              if [ -f "$ICON.fixed.png" ]; then
                mv "$ICON.fixed.png" "$ICON"
                echo "Icon repaired"
              else
                echo "Replacing broken icon..."
                curl -L https://raw.githubusercontent.com/flutter/flutter/master/dev/tools/androidx/assets/ic_launcher.png -o "$ICON"
              fi
            fi
          done

      - name: Detect project type
        run: |
          PUBSPEC=$(find build/project -name pubspec.yaml | head -n1)

          if [ ! -z "$PUBSPEC" ]; then
            echo "TYPE=flutter" >> $GITHUB_ENV
            echo "DIR=$(dirname "$PUBSPEC")" >> $GITHUB_ENV
            echo "Detected Flutter project at $(dirname "$PUBSPEC")"
            exit 0
          fi

          GRADLE=$(find build/project -name gradlew | head -n1)

          if [ ! -z "$GRADLE" ]; then
            echo "TYPE=gradle" >> $GITHUB_ENV
            echo "DIR=$(dirname "$GRADLE")" >> $GITHUB_ENV
            echo "Detected Gradle project at $(dirname "$GRADLE")"
            exit 0
          fi

          echo "Unsupported project"
          exit 1

      - name: Setup Flutter
        if: env.TYPE == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.0"
          cache: true

      - name: Flutter pub get
        if: env.TYPE == 'flutter'
        run: |
          cd "$DIR"
          flutter pub get

      - name: Build Flutter APK
        if: env.TYPE == 'flutter'
        run: |
          cd "$DIR"
          flutter build apk --release

      - name: Build Gradle APK
        if: env.TYPE == 'gradle'
        run: |
          cd "$DIR"
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Collect APK
        run: |
          mkdir -p result

          APK=$(find build -name "*release*.apk" | head -n1)

          if [ -z "$APK" ]; then
            echo "APK not found"
            exit 1
          fi

          echo "APK found: $APK"

          cp "$APK" result/app_${{ inputs.jobId }}.apk

          cd result
          zip app_${{ inputs.jobId }}.zip app_${{ inputs.jobId }}.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk_${{ inputs.jobId }}
          path: result/app_${{ inputs.jobId }}.zip

      - name: Push to Repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://github.com/Joodev65/Joomodss.id.git repo

          mkdir -p repo/X
          cp result/app_${{ inputs.jobId }}.zip repo/X/

          cd repo

          git config user.name "Actions Bot"
          git config user.email "actions@github.com"

          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/Joodev65/Joomodss.id.git

          git add .
          git commit -m "Add APK ${{ inputs.jobId }}" || true
          git push
