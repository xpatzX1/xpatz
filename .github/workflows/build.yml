name: Build APK from ZIP

on:
  workflow_dispatch:
    inputs:
      zipUrl:
        description: 'URL file ZIP mentah Android project'
        required: true
      jobId:
        description: 'ID unik job untuk tracking'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download ZIP
        run: |
          mkdir -p /tmp/build
          curl -L "${{ inputs.zipUrl }}" -o /tmp/build/project.zip
          unzip -q /tmp/build/project.zip -d /tmp/build/project

      - name: Locate gradlew
        run: |
          ROOT=$(find /tmp/build/project -name gradlew | head -n 1)
          if [ -z "$ROOT" ]; then
            echo "gradlew not found in ZIP"
            exit 1
          fi
          DIR=$(dirname "$ROOT")
          echo "ANDROID_DIR=$DIR" >> $GITHUB_ENV
          echo "Android dir: $DIR"

      - name: Build APK
        run: |
          cd "$ANDROID_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Zip APK Result
        run: |
          mkdir -p /tmp/build_result
          cp "$ANDROID_DIR/app/build/outputs/apk/debug/"*-debug*.apk \
             /tmp/build_result/app_${{ inputs.jobId }}.apk
          cd /tmp/build_result
          zip app_${{ inputs.jobId }}.zip app_${{ inputs.jobId }}.apk

      - name: Push APK to Repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://github.com/Joodev65/Joomodss.id.git repo_push
          mkdir -p repo_push/X
          cp /tmp/build_result/app_${{ inputs.jobId }}.zip repo_push/X/
          cd repo_push

          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/Joodev65/Joomodss.id.git

          git add X/app_${{ inputs.jobId }}.zip
          git commit -m "Add APK from ZIP job ${{ inputs.jobId }}" || true
          git push origin main

      - name: List APKs
        run: ls -la "$ANDROID_DIR/app/build/outputs/apk/debug/"
